services:
  db:
    image: postgres:16-alpine
    container_name: destello-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: destello
      POSTGRES_PASSWORD: destello123
      POSTGRES_DB: destello
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
